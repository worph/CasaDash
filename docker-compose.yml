services:
  casadash:
    image: casadash:latest
    build: .
    container_name: casadash
    hostname: casadash
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Path INSIDE the container where the data folder is mounted (fixed target).
      DATA_ROOT: "/DATA"
      # Path on the HOST of that SAME data folder. Apps installed by CasaDash bind
      # their volumes to the host daemon, so their compose files must reference
      # this host path (not the in-container /DATA). Set it to wherever DATA_HOST_PATH
      # points below. Must match the bind `source` under `volumes`.
      DATA_HOST_PATH: "${DATA_HOST_PATH:-/DATA}"
      PUID: "1000"
      PGID: "1000"
      TZ: "${TZ:-UTC}"
      # App-store routing template (CasaOS/casa-img compatible). Optional.
      REF_NET: "mesh"
      REF_PORT: "80"
      REF_SCHEME: "http"
      REF_DOMAIN: "${DOMAIN:-}"
      APPSTORE_URL: "https://github.com/Yundera/AppStore/archive/refs/heads/main.zip"
      # Apps the user must not uninstall from the dashboard (comma-separated store
      # ids, e.g. "casadash,casaos"). They still appear as tiles; only the
      # Uninstall action is withheld — and the API refuses it too.
      PROTECTED_APPS: "${PROTECTED_APPS:-}"
    # The Docker socket is root-owned here; grant the group so a non-root process
    # could reach it. On most hosts the socket is in the "docker" group.
    group_add:
      - "${DOCKER_GID:-999}"
    networks:
      - mesh
    volumes:
      # Bind the host data folder to /DATA. `source` MUST equal DATA_HOST_PATH so
      # that CasaDash and the apps it installs agree on where data lives.
      - type: bind
        source: ${DATA_HOST_PATH:-/DATA}
        target: /DATA
        bind:
          propagation: rshared
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock

networks:
  mesh:
    driver: bridge
    name: mesh
