# =============================================================================
# CasaDash — DEV stack ("closer to prod")
# =============================================================================
# Stands up the pieces an SSO-enabled store app needs at install time, matching
# the production PCS layout (template-root/root/docker-compose.yml) but trimmed
# to what CasaDash actually needs to *test* apps locally:
#
#   casadash            the dashboard (replaces prod `casaos`)
#   mesh-router-caddy   the "caddy router" — discovers app containers by their
#                       caddy_* labels and reverse-proxies them (ports 80/443)
#   dex                 OIDC provider at https://auth-<DOMAIN> (SSO for apps)
#   auth-registrar      dynamic OIDC client registration (apps POST here on first
#                       login and get back client_id/secret over Dex gRPC)
#
# Dropped vs prod (not needed to test locally):
#   mesh-router-tunnel / mesh-router-agent   NAT traversal / public routing
#   casaos-oidc-bridge                        federates Dex -> CasaOS login;
#                                             CasaDash has no login API, so Dex
#                                             uses a local test user instead
#                                             (see dev/dex/config.yaml).
#   smtp, admin (settings-center)             out of scope for CasaDash
#
# Everything runs on the `pcs` network so that store apps (which declare
# `networks: pcs external: true`) and auth-registrar's PTR-based caller
# attestation work exactly as in prod. CasaDash is told REF_NET=pcs so the apps
# it installs are attached to the same network.
#
#   cp .env.dev.example .env.dev   # then edit DOCKER_GID / DATA_HOST_PATH
#   ./gen-certs.sh                 # once, if dev/certs is empty
#   docker compose --env-file .env.dev up -d --build
#
# Dashboard:  https://app.localhost           (root domain -> casadash)
#             https://casadash-app.localhost  (label route)
# SSO login:  https://auth-app.localhost      (Dex; user test@casadash.local / casadash)
# =============================================================================

name: casadash-dev

services:
  # ---------------------------------------------------------------------------
  # CasaDash dashboard (prod `casaos` stand-in)
  # ---------------------------------------------------------------------------
  casadash:
    image: casadash:latest
    build: ..
    container_name: casadash
    hostname: casadash
    restart: unless-stopped
    environment:
      # --- CasaDash structural config -----------------------------------------
      DATA_ROOT: "/DATA"
      DATA_HOST_PATH: "${DATA_HOST_PATH:-/DATA}"
      PUID: "1000"
      PGID: "1000"
      TZ: "${TZ:-UTC}"
      APPSTORE_URL: "https://github.com/Yundera/AppStore/archive/refs/heads/main.zip"

      # --- Reverse-proxy reference (how CasaDash builds each app's URL) --------
      # Match prod: apps are attached to `pcs` and fronted by caddy over https.
      REF_NET: "pcs"
      REF_PORT: "443"
      REF_SCHEME: "https"
      REF_DOMAIN: "${DOMAIN}"

      # --- Interpolation vars forwarded to installed apps ---------------------
      # CasaDash passes its whole environment to `docker compose` when installing
      # a store app (see internal/envinject/envinject.go), so anything set here is
      # available to that app's ${VAR} label/env interpolation — same contract as
      # casa-img. SSO apps' caddy_* labels + OIDC config resolve against these.
      DOMAIN: "${DOMAIN}"
      # lowercase alias: store apps' x-compose-app webui-host uses ${domain}
      # (casa-img sets this too). Silences compose's "domain not set" warning.
      domain: "${DOMAIN}"
      PUBLIC_IP: "${PUBLIC_IP}"
      PUBLIC_IP_DASH: "${PUBLIC_IP_DASH}"
      PUBLIC_IPV4: "${PUBLIC_IP}"
      PUBLIC_IPV4_DASH: "${PUBLIC_IP_DASH}"
      DEFAULT_PWD: "${DEFAULT_PWD:-casadash}"
      EMAIL: "${EMAIL:-test@casadash.local}"
      APP_DOMAIN: "${DOMAIN}"
      APP_DATA_ROOT: "/DATA"
      APP_NET: "pcs"
      APP_PUBLIC_IP: "${PUBLIC_IP}"
      APP_PUBLIC_IP_DASH: "${PUBLIC_IP_DASH}"
      APP_PUBLIC_IPV4: "${PUBLIC_IP}"
      APP_PUBLIC_IPV4_DASH: "${PUBLIC_IP_DASH}"
      APP_EMAIL: "${EMAIL:-test@casadash.local}"
      APP_DEFAULT_PASSWORD: "${DEFAULT_PWD:-casadash}"
    group_add:
      - "${DOCKER_GID:-999}"
    networks:
      pcs: null
    volumes:
      - type: bind
        source: ${DATA_HOST_PATH:-/DATA}
        target: /DATA
        bind:
          propagation: rshared
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
    labels:
      # Reach the dashboard by label (dev CA). The root domain also routes here
      # via the Caddyfile's DEFAULT_SERVICE_HOST/PORT.
      caddy_0: casadash-${DOMAIN}, casaos-${DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 8080}}"

  # ---------------------------------------------------------------------------
  # mesh-router-caddy — the reverse proxy / "caddy router"
  # ---------------------------------------------------------------------------
  mesh-router-caddy:
    image: ghcr.io/yundera/mesh-router-caddy:1.2.4
    container_name: mesh-router-caddy
    hostname: mesh-router-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
    environment:
      - CADDY_DOCKER_CADDYFILE_PATH=/etc/caddy/Caddyfile
      - CADDY_INGRESS_NETWORKS=pcs
      - PCS_EMAIL=${EMAIL:-test@casadash.local}
      - DOMAIN=${DOMAIN}
      - PUBLIC_IP_DASH=${PUBLIC_IP_DASH}
      - DEFAULT_SERVICE_HOST=casadash
      - DEFAULT_SERVICE_PORT=8080
    networks:
      pcs:
        # So app containers resolve the Dex issuer host (auth-<DOMAIN>) to this
        # proxy for the OIDC back-channel, instead of to a public IP that isn't
        # reachable from inside the dev network.
        aliases:
          - auth-${DOMAIN}

  # ---------------------------------------------------------------------------
  # Dex — OIDC identity provider (https://auth-<DOMAIN>)
  # ---------------------------------------------------------------------------
  dex:
    image: ghcr.io/dexidp/dex:v2.43.1
    container_name: dex
    hostname: dex
    restart: unless-stopped
    # The dex image runs as uid 1001; the sqlite data volume is root-owned, so
    # 1001 can't create dex.db (SQLite surfaces this as a misleading ENOENT).
    # Prod's ensure-dex.sh chowns the dir to 1001; in dev we just run as root.
    user: "0:0"
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    volumes:
      # config.yaml (dev, static — see dev/dex/config.yaml) mounted read-only.
      - ./dex/config.yaml:/etc/dex/config.yaml:ro
      # dex.db (sqlite) lives on a NAMED volume, not a bind mount: SQLite's file
      # creation fails with ENOENT on Docker Desktop's Windows bind-mount backend.
      # The named volume is ext4 inside the Docker VM. It's cache — safe to drop.
      - dex-data:/data
    expose:
      - "5556"   # OIDC web endpoints (Caddy terminates TLS), on pcs
      - "5557"   # gRPC client-mgmt API — UNAUTHENTICATED, dex-internal IP only
    networks:
      pcs: null
      dex-internal:
        ipv4_address: 172.31.7.2
    labels:
      caddy_0: auth-${DOMAIN}
      caddy_0.import: gateway_tls
      caddy_0.reverse_proxy: "{{upstreams 5556}}"

  # ---------------------------------------------------------------------------
  # auth-registrar — dynamic OIDC client registration for apps
  # ---------------------------------------------------------------------------
  auth-registrar:
    image: ghcr.io/yundera/mesh-auth:1.1.3
    container_name: auth-registrar
    hostname: auth-registrar
    restart: unless-stopped
    environment:
      ISSUER_URL: https://auth-${DOMAIN}
      REGISTRAR_BACKEND: dex
      DEX_GRPC_ADDR: 172.31.7.2:5557
      DEX_CLIENTS_DIR: /tmp/dex-clients
      # Redirect-URI host suffixes an app is allowed to register a callback for.
      # Must match the suffixes the apps' caddy_* labels actually use.
      REDIRECT_HOST_SUFFIXES: "${DOMAIN}"
    expose:
      - "9092"
    networks:
      pcs: null            # /register from app sidecars + PTR attestation
      dex-internal: null   # gRPC to Dex
    depends_on:
      - dex

volumes:
  # Dex sqlite store — named volume (see the dex service for why not a bind).
  dex-data:

networks:
  # Shared, externally-managed network — the same one store apps join with
  # `external: true`. Create it once if it doesn't exist: `docker network create pcs`.
  pcs:
    name: pcs
    external: true
  # Isolated gRPC-only net for auth-registrar <-> Dex client-management API.
  # internal: true → no egress. Dex's gRPC (5557) binds to 172.31.7.2 here, so
  # app containers (pcs only) cannot reach it. Subnet pinned so Dex can bind a
  # known IP — keep clear of other host docker networks.
  dex-internal:
    name: dex-internal
    internal: true
    ipam:
      config:
        - subnet: 172.31.7.0/29
